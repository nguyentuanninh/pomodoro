<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City Flight Pomodoro</title>
  <link rel="icon" type="image/svg+xml"
    href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Ctext y="0.9em" font-size="56"%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E' />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="./style.css" />
</head>

<body class="theme-dark">
  <div class="app-background" id="appBackground"></div>
  <div class="app-overlay"></div>

  <main class="app" aria-live="polite">
    <header class="top-bar">
      <p class="brand">Lauren's Journey to Europe</p>
      <div class="top-icons">
        <button id="newCitiesBtn" class="icon-btn" type="button" aria-label="Generate new cities"
          title="Generate new cities">
          ✈
        </button>
        <button id="fullscreenToggleBtn" class="icon-btn" type="button" aria-label="Enter fullscreen"
          title="Enter fullscreen">
          ⛶
        </button>
        <button id="themeToggleBtn" class="icon-btn" type="button" aria-label="Toggle theme" title="Toggle theme">
          <span id="themeToggleLabel">☀</span>
        </button>
      </div>
    </header>

    <section class="center-stage">
      <p id="routeDisplay" class="route-line">Paris → Rome</p>
      <div class="meta-row">
        <p id="flightTimeDisplay" class="meta-pill">✈ 0m</p>
        <p id="sessionDisplay" class="meta-pill">1/1</p>
      </div>

      <div class="timer-wrap">
        <div class="timer-ring" role="img" aria-label="Current session progress">
          <svg viewBox="0 0 120 120" aria-hidden="true">
            <circle class="ring-track" cx="60" cy="60" r="52"></circle>
            <circle id="ringProgress" class="ring-progress" cx="60" cy="60" r="52"></circle>
          </svg>
          <div class="timer-text">
            <p id="modeDisplay" class="mode">⏱</p>
            <p id="timerDisplay" class="timer-value">00:00</p>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="startPauseBtn" class="primary-btn icon-btn start-pause-btn" type="button" aria-label="Start" title="Start">Start</button>
        <button id="resetBtn" class="icon-btn" type="button" aria-label="Reset" title="Reset">↺</button>
        <button id="skipBtn" class="icon-btn" type="button" aria-label="Skip current session"
          title="Skip current session">⏭</button>
      </div>
    </section>

    <section class="bottom-dock">
      <div class="sound-strip">
        <div class="music-panel">
          <button id="muteToggleBtn" class="icon-btn music-toggle" type="button" aria-label="Turn music on"
            title="Turn music on">
            ♫ Off
          </button>
        </div>

        <label class="icon-control" aria-label="Volume">
          <span aria-hidden="true">◉</span>
          <input id="volumeRange" type="range" min="0" max="100" value="60" />
        </label>
      </div>

      <div class="progress-track">
        <div id="totalProgressBar" class="progress-fill"></div>
      </div>
      <p id="progressPercent" class="progress-text">0%</p>
    </section>
  </main>
  <div class="footer-dog-track" aria-hidden="true">
    <div id="footerAnimationDoggie" class="footer-json-sprite footer-json-sprite-1"></div>
    <div id="footerAnimationGiraffe" class="footer-json-sprite footer-json-sprite-2"></div>
    <div id="footerAnimationPuppy" class="footer-json-sprite footer-json-sprite-3"></div>
    <div id="footerAnimationCrab" class="footer-json-sprite footer-json-sprite-4"></div>
    <div id="footerAnimationJellyfish" class="footer-json-sprite footer-json-sprite-5"></div>
    <div id="footerAnimationJumpingPig" class="footer-json-sprite footer-json-sprite-6"></div>
    <img id="musicSprite" class="music-sprite" src="./animation/1.png" alt="Music animation" />
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="./script.js"></script>
</body>

</html>
